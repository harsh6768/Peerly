# Monorepo: in Netlify UI set Base directory to "frontend" (this file is inside frontend/).
# VITE_* vars must be set for the build; see DEPLOYMENT.md §2 "Why production still calls localhost".

[build]
  command = "npm run build"
  publish = "dist"

# Set VITE_API_BASE_URL, VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY in Netlify → Environment variables, then redeploy.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
