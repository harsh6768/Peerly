[build]
  command = "npm run build"
  publish = "dist"

# Set VITE_* variables in Netlify UI (Production / Preview) — see .env.production.example

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
